services:
  db:
    image: postgres:15
    container_name: warehub_db
    restart: always
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/seed.sql:/docker-entrypoint-initdb.d/seed.sql  # seed file για πρώτη εκκίνηση

  web:
    build: ./app
    container_name: warehouse_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - db

volumes:
  postgres_data: